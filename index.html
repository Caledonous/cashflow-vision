              <div>
                <label className="text-xs font-medium text-slate-500 uppercase">Nom de l'objectif</label>
                <input autoFocus type="text" value={name} onChange={(e) => setName(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1" placeholder="Ex: Apport appartement..."/>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs font-medium text-slate-500 uppercase">Montant cible ({currency})</label>
                  <input type="number" value={targetAmount} onChange={(e) => setTargetAmount(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1"/>
                </div>
                <div>
                  <label className="text-xs font-medium text-slate-500 uppercase">Échéance</label>
                  <input type="month" value={targetDate} onChange={(e) => setTargetDate(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1"/>
                </div>
              </div>
              <div>
                <label className="text-xs font-medium text-slate-500 uppercase">Déjà épargné ({currency})</label>
                <input type="number" value={currentAmount} onChange={(e) => setCurrentAmount(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1"/>
              </div>
            </div>
            <div className="p-4 border-t border-slate-100 bg-slate-50 flex gap-2 flex-wrap">
              {initialData && <button onClick={() => onDelete(initialData.id)} className="px-3 py-2 text-sm text-rose-600 hover:bg-rose-50 rounded-lg flex items-center gap-1"><Trash2 size={14}/> Supprimer</button>}
              <button onClick={onClose} className="flex-1 px-3 py-2 text-sm text-slate-600 hover:bg-slate-200 rounded-lg">Annuler</button>
              <button onClick={handleSubmit} className="flex-1 px-3 py-2 text-sm bg-blue-600 text-white hover:bg-blue-700 rounded-lg font-medium">Enregistrer</button>
            </div>
          </div>
        </div>
      );
    };

    /* ============================================================
       VUE OBJECTIFS FINANCIERS
       ============================================================ */
    const GoalsView = ({ goals, savingsCapacityNow, currency, onEdit, onAdd }) => {
      const computeGoal = (g) => {
        const now = new Date();
        const [y, m] = g.targetDate.split('-').map(Number);
        const target = new Date(y, m - 1, 1);
        const monthsLeft = Math.max(1, (target.getFullYear() - now.getFullYear()) * 12 + (target.getMonth() - now.getMonth()));
        const remaining = Math.max(0, g.targetAmount - g.currentAmount);
        const needed = remaining / monthsLeft;
        const progress = g.targetAmount > 0 ? Math.min(100, Math.round(g.currentAmount / g.targetAmount * 100)) : 0;
        const feasible = needed <= (savingsCapacityNow / (currency === 'XPF' ? RATE_EUR_XPF : 1));
        return { monthsLeft, remaining, needed, progress, feasible };
      };

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <h3 className="text-sm font-semibold text-slate-700">Objectifs financiers</h3>
            <button onClick={onAdd} className="text-xs px-3 py-1.5 bg-blue-600 text-white rounded-lg flex items-center gap-1 hover:bg-blue-700">
              <Plus size={12}/> Nouvel objectif
            </button>
          </div>
          {goals.length === 0 && (
            <div className="bg-white p-6 rounded-xl border border-slate-200 text-center text-slate-400 italic text-sm">
              Aucun objectif défini. Crée ton premier objectif pour planifier.
            </div>
          )}
          {goals.map(g => {
            const rate = currency === 'XPF' ? RATE_EUR_XPF : 1;
            const c = computeGoal(g);
            const targetView = g.targetAmount * rate;
            const currentView = g.currentAmount * rate;
            const neededView = c.needed * rate;
            return (
              <div key={g.id} onClick={() => onEdit(g)} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm cursor-pointer hover:border-blue-300">
                <div className="flex justify-between items-start mb-2">
                  <div>
                    <div className="font-bold text-slate-800">{g.name}</div>
                    <div className="text-xs text-slate-400">Échéance : {g.targetDate} · dans {c.monthsLeft} mois</div>
                  </div>
                  <div className={`text-xs font-bold px-2 py-1 rounded ${c.feasible ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>
                    {c.feasible ? 'Atteignable' : 'Difficile'}
                  </div>
                </div>
                <div className="text-xs text-slate-500 mb-1">
                  {formatCurrency(currentView, currency)} / {formatCurrency(targetView, currency)} ({c.progress}%)
                </div>
                <div className="h-2 bg-slate-100 rounded-full overflow-hidden mb-2">
                  <div className="h-full bg-blue-500 rounded-full" style={{ width: `${c.progress}%` }}/>
                </div>
                <div className="text-xs text-slate-600">
                  Il faut épargner <span className="font-bold text-slate-800">{formatCurrency(neededView, currency)}</span>/mois pour y arriver
                  <span className="text-slate-400 ml-2">(capacité actuelle : {formatCurrency(savingsCapacityNow, currency)})</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    /* ============================================================
       MODULE ÉPARGNE & PLACEMENTS
       ============================================================ */
    const SavingsView = ({ 
      forecast, currency, safetyMattress, setSafetyMattress, 
      savingsCapacityLisse, savingsAccounts, onAddAccount, onEditAccount,
      whatIfAmount, setWhatIfAmount, whatIfRate, setWhatIfRate, 
      whatIfYears, setWhatIfYears
    }) => {
      const rate = currency === 'XPF' ? RATE_EUR_XPF : 1;

      // Matelas de sécurité (X mois de dépenses mensuelles moyennes lissées)
      const monthlyExpenseLisse = useMemo(() => {
        // Approximation depuis le forecast
        if (!forecast || forecast.length === 0) return 0;
        const avg = forecast.slice(0, 12).reduce((s, m) => s + m.totalExpense, 0) / Math.min(12, forecast.length);
        return avg;
      }, [forecast]);
      
      const mattressAmount = monthlyExpenseLisse * safetyMattress;
      
      // Excédent placable mois par mois
      const placeableData = useMemo(() => {
        if (!forecast) return [];
        return forecast.slice(0, 60).map(m => ({
          label: m.label,
          solde: m.finalEndBalance,
          matelas: mattressAmount,
          placable: Math.max(0, m.finalEndBalance - mattressAmount)
        }));
      }, [forecast, mattressAmount]);

      // Projection des comptes d'épargne (intérêts composés mensuels)
      const projectAccount = (acc, months) => {
        const monthlyRate = (acc.annualRate / 100) / 12;
        let bal = acc.balance;
        const series = [];
        for (let i = 0; i < months; i++) {
          bal = bal * (1 + monthlyRate) + acc.monthlyDeposit;
          series.push({ month: i + 1, value: bal });
        }
        return series;
      };

      const totalSavings = savingsAccounts.reduce((s, a) => s + a.balance, 0);
      const totalProjected10y = savingsAccounts.reduce((s, a) => {
        const series = projectAccount(a, 120);
        return s + (series[series.length - 1]?.value || a.balance);
      }, 0);

      // Simulateur "What if"
      const whatIfData = useMemo(() => {
        const months = whatIfYears * 12;
        const monthlyRate = (whatIfRate / 100) / 12;
        const amountEur = whatIfAmount / rate;
        let placed = 0;
        let notPlaced = 0;
        const series = [];
        for (let i = 1; i <= months; i++) {
          placed = placed * (1 + monthlyRate) + amountEur;
          notPlaced += amountEur;
          if (i % 6 === 0 || i === months || i === 1) {
            series.push({
              month: i,
              year: (i / 12).toFixed(1),
              place: placed * rate,
              cash: notPlaced * rate
            });
          }
        }
        return series;
      }, [whatIfAmount, whatIfRate, whatIfYears, rate]);

      const whatIfFinal = whatIfData[whatIfData.length - 1] || { place: 0, cash: 0 };

      return (
        <div className="space-y-4">
          {/* MATELAS DE SÉCURITÉ */}
          <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-sm font-semibold text-slate-700">Matelas de sécurité</h3>
              <div className="flex items-center gap-2">
                <label className="text-xs text-slate-500">Combien de mois ?</label>
                <input 
                  type="number" min="1" max="24" step="1" value={safetyMattress} 
                  onChange={(e) => setSafetyMattress(parseInt(e.target.value) || 3)}
                  className="w-16 p-1 text-center border border-slate-300 rounded"
                />
              </div>
            </div>
            <div className="text-xs text-slate-500 mb-3">
              Pour {safetyMattress} mois de dépenses moyennes ({formatCurrency(monthlyExpenseLisse * rate, currency)}/mois), 
              il te faut un matelas de <span className="font-bold text-slate-700">{formatCurrency(mattressAmount * rate, currency)}</span>.
            </div>
            {RechartsLib && (
              <div className="h-[200px]">
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={placeableData} margin={{ top: 5, right: 0, left: -20, bottom: 0 }}>
                    <defs>
                      <linearGradient id="colorPlacable" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%" stopColor="#10b981" stopOpacity={0.7}/>
                        <stop offset="95%" stopColor="#10b981" stopOpacity={0}/>
                      </linearGradient>
                    </defs>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                    <XAxis dataKey="label" tick={{fontSize: 10}} stroke="#94a3b8" minTickGap={30} />
                    <YAxis tick={{fontSize: 10}} stroke="#94a3b8" tickFormatter={(v) => currency === 'EUR' ? `${(v*rate/1000).toFixed(0)}k€` : `${(v*rate/1000).toFixed(0)}k`} />
                    <Tooltip 
                      formatter={(value, name) => [formatCurrency(value * rate, currency), name === 'solde' ? 'Solde' : name === 'matelas' ? 'Matelas' : 'Plaçable']}
                      contentStyle={{ borderRadius: '8px', border: 'none', fontSize: '12px' }}
                    />
                    <ReferenceLine y={mattressAmount} stroke="#f59e0b" strokeDasharray="3 3" label={{ value: "Matelas", fontSize: 10, fill: '#f59e0b' }}/>
                    <Area type="monotone" dataKey="solde" stroke="#3b82f6" fill="none" />
                    <Area type="monotone" dataKey="placable" stroke="#10b981" fillOpacity={1} fill="url(#colorPlacable)" />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            )}
          </div>

          {/* COMPTES D'ÉPARGNE */}
          <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-sm font-semibold text-slate-700">Mes poches d'épargne</h3>
              <button onClick={onAddAccount} className="text-xs px-3 py-1.5 bg-blue-600 text-white rounded-lg flex items-center gap-1 hover:bg-blue-700">
                <Plus size={12}/> Ajouter une poche
              </button>
            </div>
            {savingsAccounts.length === 0 ? (
              <div className="text-center text-slate-400 italic text-sm py-6">
                Aucune poche définie. Ajoute Livret A, PEL, AV, crypto…
              </div>
            ) : (
              <>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                  <div className="bg-slate-50 rounded-lg p-3">
                    <div className="text-[10px] uppercase text-slate-500 font-bold">Total actuel</div>
                    <div className="text-xl font-bold text-slate-700">{formatCurrency(totalSavings * rate, currency)}</div>
                  </div>
                  <div className="bg-emerald-50 rounded-lg p-3">
                    <div className="text-[10px] uppercase text-emerald-700 font-bold">Projection 10 ans</div>
                    <div className="text-xl font-bold text-emerald-700">{formatCurrency(totalProjected10y * rate, currency)}</div>
                  </div>
                </div>
                <div className="space-y-2">
                  {savingsAccounts.map(acc => {
                    const proj = projectAccount(acc, 120);
                    const final = proj[proj.length-1]?.value || acc.balance;
                    return (
                      <div key={acc.id} onClick={() => onEditAccount(acc)} className="border border-slate-200 rounded-lg p-3 hover:border-blue-300 cursor-pointer">
                        <div className="flex justify-between items-start mb-2">
                          <div>
                            <div className="font-medium text-slate-800 text-sm">{acc.name}</div>
                            <div className="text-[10px] text-slate-400">{acc.type} · {acc.annualRate}%/an · +{formatCurrency(acc.monthlyDeposit * rate, currency)}/mois</div>
                          </div>
                          <div className="text-right">
                            <div className="font-bold text-slate-700 text-sm">{formatCurrency(acc.balance * rate, currency)}</div>
                            <div className="text-[10px] text-emerald-600">→ {formatCurrency(final * rate, currency)} dans 10 ans</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>

          {/* SIMULATEUR WHAT IF */}
          <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <h3 className="text-sm font-semibold text-slate-700 mb-3">Simulateur « What if »</h3>
            <p className="text-xs text-slate-500 mb-3">
              Et si tu plaçais X par mois à Y% pendant Z années ? Compare placé vs cash.
            </p>
            <div className="grid grid-cols-3 gap-3 mb-4">
              <div>
                <label className="text-[10px] uppercase text-slate-500 font-bold">Versement / mois ({currency})</label>
                <input type="number" value={whatIfAmount} onChange={(e) => setWhatIfAmount(parseFloat(e.target.value) || 0)} className="w-full p-2 border border-slate-300 rounded-lg mt-1 text-sm"/>
              </div>
              <div>
                <label className="text-[10px] uppercase text-slate-500 font-bold">Taux annuel %</label>
                <input type="number" step="0.1" value={whatIfRate} onChange={(e) => setWhatIfRate(parseFloat(e.target.value) || 0)} className="w-full p-2 border border-slate-300 rounded-lg mt-1 text-sm"/>
              </div>
              <div>
                <label className="text-[10px] uppercase text-slate-500 font-bold">Années</label>
                <input type="number" min="1" max="40" value={whatIfYears} onChange={(e) => setWhatIfYears(parseInt(e.target.value) || 1)} className="w-full p-2 border border-slate-300 rounded-lg mt-1 text-sm"/>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3 mb-3">
              <div className="bg-slate-50 rounded-lg p-3">
                <div className="text-[10px] uppercase text-slate-500 font-bold">Sans placement (cash)</div>
                <div className="text-lg font-bold text-slate-700">{formatCurrency(whatIfFinal.cash, currency)}</div>
              </div>
              <div className="bg-emerald-50 rounded-lg p-3">
                <div className="text-[10px] uppercase text-emerald-700 font-bold">Avec placement ({whatIfRate}%)</div>
                <div className="text-lg font-bold text-emerald-700">{formatCurrency(whatIfFinal.place, currency)}</div>
                <div className="text-[10px] text-emerald-600 mt-1">Gain : +{formatCurrency(whatIfFinal.place - whatIfFinal.cash, currency)}</div>
              </div>
            </div>
            {RechartsLib && whatIfData.length > 0 && (
              <div className="h-[200px]">
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={whatIfData} margin={{ top: 5, right: 5, left: -20, bottom: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                    <XAxis dataKey="year" tick={{fontSize: 10}} stroke="#94a3b8" tickFormatter={(v) => `${v}a`}/>
                    <YAxis tick={{fontSize: 10}} stroke="#94a3b8" tickFormatter={(v) => `${(v/1000).toFixed(0)}k`} />
                    <Tooltip formatter={(v, n) => [formatCurrency(v, currency), n === 'place' ? 'Placé' : 'Cash']} contentStyle={{ borderRadius: '8px', border: 'none', fontSize: '12px' }}/>
                    <Area type="monotone" dataKey="cash" stroke="#94a3b8" fill="#94a3b8" fillOpacity={0.2} />
                    <Area type="monotone" dataKey="place" stroke="#10b981" fill="#10b981" fillOpacity={0.3} />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            )}
            <p className="text-[10px] text-slate-400 mt-2 italic">
              Cette simulation suppose un taux fixe et constant. Les rendements réels (notamment crypto/actions) sont volatils. Ceci n'est pas un conseil financier.
            </p>
          </div>
        </div>
      );
    };

    /* ============================================================
       ÉCRAN DE CONNEXION / INSCRIPTION
       ============================================================ */
    const LoginScreen = () => {
      const [mode, setMode] = useState('login'); // 'login' | 'signup'
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [info, setInfo] = useState('');

      const handleSubmit = async () => {
        setError('');
        setInfo('');
        if (!email.trim() || !password) {
          setError('Email et mot de passe requis.');
          return;
        }
        if (password.length < 6) {
          setError('Le mot de passe doit faire au moins 6 caractères.');
          return;
        }
        setLoading(true);
        try {
          if (mode === 'login') {
            const { error: err } = await supabaseClient.auth.signInWithPassword({ email: email.trim(), password });
            if (err) throw err;
          } else {
            const { error: err, data } = await supabaseClient.auth.signUp({ email: email.trim(), password });
            if (err) throw err;
            if (data.session) {
              // Connecté directement (confirmation email désactivée)
            } else {
              setInfo('Compte créé ! Vérifie ta boîte mail pour confirmer ton adresse avant de te connecter.');
            }
          }
        } catch (e) {
          const msg = e.message || 'Erreur inconnue';
          if (msg.includes('Invalid login credentials')) setError('Email ou mot de passe incorrect.');
          else if (msg.includes('already registered') || msg.includes('already exists')) setError('Un compte existe déjà avec cet email. Essaie de te connecter.');
          else setError(msg);
        }
        setLoading(false);
      };

      return (
        <div className="h-screen flex items-center justify-center bg-slate-50 p-4">
          <div className="bg-white rounded-xl shadow-lg border border-slate-200 w-full max-w-sm p-6">
            <div className="text-center mb-6">
              <div className="inline-flex items-center gap-2 text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                <TrendingUp size={26} className="text-blue-600" /> CashFlow Vision
              </div>
              <p className="text-xs text-slate-400 mt-1">
                {mode === 'login' ? 'Connecte-toi pour accéder à tes données' : 'Crée ton compte personnel'}
              </p>
            </div>

            <div className="space-y-3">
              <div>
                <label className="text-xs font-medium text-slate-500 uppercase">Email</label>
                <input
                  type="email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter') handleSubmit(); }}
                  className="w-full p-2 border border-slate-300 rounded-lg mt-1"
                  placeholder="toi@email.com"
                  autoFocus
                />
              </div>
              <div>
                <label className="text-xs font-medium text-slate-500 uppercase">Mot de passe</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter') handleSubmit(); }}
                  className="w-full p-2 border border-slate-300 rounded-lg mt-1"
                  placeholder="••••••••"
                />
              </div>

              {error && (
                <div className="text-xs text-rose-600 bg-rose-50 border border-rose-200 rounded-lg p-2 flex items-center gap-2">
                  <AlertTriangle size={14} className="shrink-0"/> {error}
                </div>
              )}
              {info && (
                <div className="text-xs text-emerald-600 bg-emerald-50 border border-emerald-200 rounded-lg p-2 flex items-center gap-2">
                  <Info size={14} className="shrink-0"/> {info}
                </div>
              )}

              <button
                onClick={handleSubmit}
                disabled={loading}
                className="w-full py-2.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50 flex items-center justify-center gap-2"
              >
                {loading ? <Loader2 size={16}/> : (mode === 'login' ? 'Se connecter' : 'Créer mon compte')}
              </button>
            </div>

            <div className="text-center mt-4 text-xs text-slate-500">
              {mode === 'login' ? (
                <>Pas encore de compte ? <button onClick={() => { setMode('signup'); setError(''); setInfo(''); }} className="text-blue-600 font-medium hover:underline">Créer un compte</button></>
              ) : (
                <>Déjà un compte ? <button onClick={() => { setMode('login'); setError(''); setInfo(''); }} className="text-blue-600 font-medium hover:underline">Se connecter</button></>
              )}
            </div>
          </div>
        </div>
      );
    };

    /* ============================================================
       APP PRINCIPALE
       ============================================================ */
    const App = () => {
      // ---- STATE PRINCIPAL ----
      const [isLoading, setIsLoading] = useState(true);
      const [session, setSession] = useState(null);
      const [authChecked, setAuthChecked] = useState(false);

      /* ----------------------------------------------------------
         AUTHENTIFICATION SUPABASE
         Vérifie la session existante au démarrage, puis écoute les
         changements (connexion/déconnexion) pour rester synchronisé.
         ---------------------------------------------------------- */
      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data }) => {
          setSession(data.session);
          setAuthChecked(true);
        });

        const { data: listener } = supabaseClient.auth.onAuthStateChange((_event, newSession) => {
          setSession(newSession);
          if (!newSession) {
            // Déconnexion : on vide l'état pour ne pas montrer les données du précédent compte
            setOperations([]);
            setStartingBalance(0);
            setAdjustments({});
            setSavingsAccounts([]);
            setSavingsAdjustments({});
            setGoals([]);
            setIsLoading(true);
          }
        });

        return () => listener.subscription.unsubscribe();
      }, []);
      const [currency, setCurrency] = useState('EUR');
      const rate = currency === 'XPF' ? RATE_EUR_XPF : 1;
      const toView = (val) => val * rate;
      const fromView = (val) => val / rate;

      // Données métier — un seul "espace", pas de scénarios
      const [operations, setOperations] = useState([]);
      const [startingBalance, setStartingBalance] = useState(0);
      const [adjustments, setAdjustments] = useState({});

      // ---- STATE UI ----
      const [isFormOpen, setIsFormOpen] = useState(false);
      const [editingOperation, setEditingOperation] = useState(null);
      const [isTrackerOpen, setIsTrackerOpen] = useState(false);
      const [activeTarget, setActiveTarget] = useState(null); // pour PaymentModal
      const [isHistoryOpen, setIsHistoryOpen] = useState(false);
      const [historyList, setHistoryList] = useState([]);
      const [isEditingBalance, setIsEditingBalance] = useState(false);
      const [activeTab, setActiveTab] = useState('chart');
      const [searchTerm, setSearchTerm] = useState('');
      const [filterCategory, setFilterCategory] = useState(null);
      const [filterTag, setFilterTag] = useState(null);
      const [showHistory, setShowHistory] = useState(false);
      const [showAnalytics, setShowAnalytics] = useState(true);
      
      // Nouveaux states pour modules avancés
      const [activeView, setActiveView] = useState('main'); // 'main' | 'yearly' | 'savings' | 'goals'
      const [criticalAlertSeen, setCriticalAlertSeen] = useState(false);
      const [criticalThreshold, setCriticalThreshold] = useState(500); // seuil en EUR
      const [safetyMattress, setSafetyMattress] = useState(3); // mois de dépenses
      const [savingsAccounts, setSavingsAccounts] = useState([]); // poches d'épargne
      const [savingsAdjustments, setSavingsAdjustments] = useState({}); // ajustements manuels capital par mois/poche
      const [editingAccount, setEditingAccount] = useState(null);
      const [isAccountFormOpen, setIsAccountFormOpen] = useState(false);
      const [goals, setGoals] = useState([]); // objectifs financiers
      const [editingGoal, setEditingGoal] = useState(null);
      const [isGoalFormOpen, setIsGoalFormOpen] = useState(false);
      // Simulateur What if
      const [whatIfAmount, setWhatIfAmount] = useState(500);
      const [whatIfRate, setWhatIfRate] = useState(3);
      const [whatIfYears, setWhatIfYears] = useState(10);
      const [whatIfStart, setWhatIfStart] = useState(new Date().toISOString().slice(0, 7));
      
      // ---- SIMULATION ----
      const [isSimulationMode, setIsSimulationMode] = useState(false);
      const backupState = useRef(null);

      // ---- SAUVEGARDE STATUS ----
      // 'idle' | 'saving' | 'saved' | 'error' | 'local-only'
      const [storageStatus, setStorageStatus] = useState('idle');
      const [lastSaveAt, setLastSaveAt] = useState(null);
      const [serverTimestamp, setServerTimestamp] = useState(0);
      const saveDataTimeoutRef = useRef(null);
      const saveRetryCountRef = useRef(0);
      const lastSavedPayloadRef = useRef(null);
      const fileInputRef = useRef(null);

      // ---- MODALES ----
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [promptDialog, setPromptDialog] = useState(null);
      const [toast, setToast] = useState(null);
      const [pendingImport, setPendingImport] = useState(null); // { operations, startingBalance, adjustments }

      const showToast = useCallback((msg, type = 'info') => {
        setToast({ msg, type, id: Date.now() });
      }, []);

      /* ----------------------------------------------------------
         CHARGEMENT INITIAL
         Stratégie : Supabase (si connecté) → localStorage en fallback
         ---------------------------------------------------------- */
      useEffect(() => {
        const applyData = (data) => {
          if (!data) return;
          const migrated = migrateImportedData(data);
          setOperations(migrated.operations);
          setStartingBalance(migrated.startingBalance);
          setAdjustments(migrated.adjustments);
          if (data.defaultCurrency === 'XPF' || data.defaultCurrency === 'EUR') {
            setCurrency(data.defaultCurrency);
          }
          if (Array.isArray(data.savingsAccounts)) setSavingsAccounts(data.savingsAccounts);
          if (data.savingsAdjustments && typeof data.savingsAdjustments === 'object') setSavingsAdjustments(data.savingsAdjustments);
          if (Array.isArray(data.goals)) setGoals(data.goals);
          if (typeof data.safetyMattress === 'number') setSafetyMattress(data.safetyMattress);
          if (typeof data.criticalThreshold === 'number') setCriticalThreshold(data.criticalThreshold);
        };

        const loadLocalFallback = () => {
          try {
            const local = localStorage.getItem('CASHFLOW_DATA_V2');
            if (local) {
              const parsed = JSON.parse(local);
              applyData(parsed);
              setStorageStatus('local-only');
              showToast('Données chargées depuis le cache local', 'info');
              return true;
            }
          } catch (e) {
            console.error('Local fallback failed:', e);
          }
          return false;
        };

        // Pas encore de session = pas connecté, on n'essaie pas de charger
        if (!session) {
          setIsLoading(false);
          return;
        }

        const loadFromSupabase = async () => {
          setStorageStatus('saving');
          try {
            const { data: rows, error } = await supabaseClient
              .from('cashflow_data')
              .select('data, updated_at')
              .eq('user_id', session.user.id)
              .order('updated_at', { ascending: false })
              .limit(1);

            if (error) throw error;

            if (rows && rows.length > 0) {
              applyData(rows[0].data);
              setLastSaveAt(new Date(rows[0].updated_at).getTime());
              setStorageStatus('saved');
            } else {
              // Pas encore de ligne pour cet utilisateur : tenter le fallback local (migration depuis GAS export par ex.)
              if (!loadLocalFallback()) {
                setStorageStatus('saved'); // vide, mais OK
              }
            }
          } catch (e) {
            console.error('Supabase load failed:', e);
            if (!loadLocalFallback()) {
              setStorageStatus('error');
              showToast('Impossible de joindre Supabase', 'error');
            }
          }
          setIsLoading(false);
        };

        loadFromSupabase();
      }, [session, showToast]);

      /* ----------------------------------------------------------
         SAUVEGARDE AUTOMATIQUE — robuste avec retry et fallback
         - Debounce 1.5s
         - Persistance : Supabase (par utilisateur) + localStorage
         - Retry x3 avec backoff si erreur réseau
         - localStorage TOUJOURS écrit en parallèle (filet de sécurité)
         ---------------------------------------------------------- */
      const performSave = useCallback((payload, attemptNumber = 1) => {
        const MAX_ATTEMPTS = 3;

        // 1. Écriture localStorage immédiate et systématique (synchrone)
        try {
          localStorage.setItem('CASHFLOW_DATA_V2', payload);
        } catch (e) {
          console.error('localStorage failed:', e);
        }

        // 2. Tentative Supabase si connecté
        if (!session) {
          setStorageStatus('local-only');
          setLastSaveAt(Date.now());
          return;
        }

        setStorageStatus('saving');
        const parsedPayload = JSON.parse(payload);

        const trySave = async () => {
          try {
            const { error } = await supabaseClient
              .from('cashflow_data')
              .upsert(
                { user_id: session.user.id, data: parsedPayload, updated_at: new Date().toISOString() },
                { onConflict: 'user_id' }
              );
            if (error) throw error;
            setStorageStatus('saved');
            setLastSaveAt(Date.now());
            saveRetryCountRef.current = 0;
            lastSavedPayloadRef.current = payload;
          } catch (e) {
            console.error(`Save attempt ${attemptNumber} failed:`, e);
            if (attemptNumber < MAX_ATTEMPTS) {
              const delay = 1000 * Math.pow(2, attemptNumber);
              setTimeout(() => performSave(payload, attemptNumber + 1), delay);
            } else {
              setStorageStatus('local-only');
              showToast('Sauvegarde serveur impossible (cache local OK)', 'error');
            }
          }
        };
        trySave();
      }, [session, showToast]);

      useEffect(() => {
        if (isLoading || isSimulationMode) return;
        
        const payload = JSON.stringify({
          operations,
          startingBalance,
          adjustments,
          defaultCurrency: currency,
          savingsAccounts,
          savingsAdjustments,
          goals,
          safetyMattress,
          criticalThreshold,
          version: '3.0',
          lastModifiedAt: Date.now()
        });

        // Ne rien faire si rien n'a changé
        if (payload === lastSavedPayloadRef.current) return;

        if (saveDataTimeoutRef.current) clearTimeout(saveDataTimeoutRef.current);
        setStorageStatus('saving');
        saveDataTimeoutRef.current = setTimeout(() => {
          performSave(payload);
        }, 1500);

        return () => clearTimeout(saveDataTimeoutRef.current);
      }, [operations, startingBalance, adjustments, currency, savingsAccounts, savingsAdjustments, goals, safetyMattress, criticalThreshold, isLoading, isSimulationMode, session, performSave]);

      /* ----------------------------------------------------------
         SAUVEGARDE FORCÉE (bouton manuel)
         ---------------------------------------------------------- */
      const handleForceSave = () => {
        const payload = JSON.stringify({
          operations,
          startingBalance,
          adjustments,
          defaultCurrency: currency,
          savingsAccounts,
          savingsAdjustments,
          goals,
          safetyMattress,
          criticalThreshold,
          version: '3.0',
          lastModifiedAt: Date.now()
        });
        performSave(payload);
        showToast('Sauvegarde forcée', 'info');
      };

      /* ----------------------------------------------------------
         OPÉRATIONS CRUD
         ---------------------------------------------------------- */
      const handleSaveOperation = (op) => {
        setOperations(prev => {
          const exists = prev.some(o => o.id === op.id);
          return exists ? prev.map(o => o.id === op.id ? op : o) : [...prev, op];
        });
        setEditingOperation(null);
        setIsFormOpen(false);
      };

      const handleDeleteOperation = (id) => {
        setConfirmDialog({
          title: 'Supprimer l\'opération ?',
          message: 'Cette action ne peut pas être annulée.',
          danger: true,
          confirmText: 'Supprimer',
          onConfirm: () => {
            setOperations(prev => prev.filter(o => o.id !== id));
            setIsFormOpen(false);
            setConfirmDialog(null);
            showToast('Opération supprimée', 'success');
          }
        });
      };

      const handleDuplicateOperation = (op) => {
        const copy = {
          ...op,
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 9),
          label: op.label + ' (copie)'
        };
        setOperations(prev => [...prev, copy]);
        setEditingOperation(copy);
        showToast('Opération dupliquée — modifie la copie', 'success');
      };

      // Comptes d'épargne
      const handleSaveAccount = (acc) => {
        setSavingsAccounts(prev => {
          const exists = prev.some(a => a.id === acc.id);
          return exists ? prev.map(a => a.id === acc.id ? acc : a) : [...prev, acc];
        });
        setIsAccountFormOpen(false);
        setEditingAccount(null);
        showToast('Poche enregistrée', 'success');
      };
      const handleDeleteAccount = (id) => {
        setConfirmDialog({
          title: 'Supprimer cette poche ?',
          message: 'Cette action ne peut pas être annulée.',
          danger: true,
          confirmText: 'Supprimer',
          onConfirm: () => {
            setSavingsAccounts(prev => prev.filter(a => a.id !== id));
            setIsAccountFormOpen(false);
            setEditingAccount(null);
            setConfirmDialog(null);
            showToast('Poche supprimée', 'success');
          }
        });
      };

      // Objectifs
      const handleSaveGoal = (g) => {
        setGoals(prev => {
          const exists = prev.some(x => x.id === g.id);
          return exists ? prev.map(x => x.id === g.id ? g : x) : [...prev, g];
        });
        setIsGoalFormOpen(false);
        setEditingGoal(null);
        showToast('Objectif enregistré', 'success');
      };
      const handleDeleteGoal = (id) => {
        setConfirmDialog({
          title: 'Supprimer cet objectif ?',
          message: 'Cette action ne peut pas être annulée.',
          danger: true,
          confirmText: 'Supprimer',
          onConfirm: () => {
            setGoals(prev => prev.filter(x => x.id !== id));
            setIsGoalFormOpen(false);
            setEditingGoal(null);
            setConfirmDialog(null);
            showToast('Objectif supprimé', 'success');
          }
        });
      };

      const handleAdjustment = (monthKey, value) => {
        setAdjustments(prev => {
          const next = { ...prev };
          if (value === undefined) delete next[monthKey];
          else next[monthKey] = fromView(value);
          return next;
        });
      };

      const handleSavingsAdjustment = (monthKey, accId, value) => {
        setSavingsAdjustments(prev => {
          const next = { ...prev };
          const monthObj = { ...(next[monthKey] || {}) };
          if (value === undefined || value === null) {
            delete monthObj[accId];
          } else {
            monthObj[accId] = fromView(value);
          }
          if (Object.keys(monthObj).length === 0) {
            delete next[monthKey];
          } else {
            next[monthKey] = monthObj;
          }
          return next;
        });
      };

      /* ----------------------------------------------------------
         PILOTAGE DU MOIS (actions)
         ---------------------------------------------------------- */
      const handleTrackerAction = (op, monthKey, action) => {
        if (action === 'OPEN_MODAL') {
          setActiveTarget({ op, monthKey });
          return;
        }
        const opDateStr = `${monthKey}-01`;
        let newOps = [...operations];

        if (action === 'CANCEL') {
          newOps.push({
            id: Date.now().toString() + '_SKIP',
            label: `Annulé: ${op.label}`,
            amount: -op.amount,
            type: op.type,
            frequency: Frequency.ONCE,
            date: opDateStr,
            category: op.category || DEFAULT_CATEGORY,
            tags: op.tags || []
          });
          showToast(`"${op.label}" marqué comme annulé`, 'success');
        } else if (action === 'PAY_EXACT') {
          newOps.push(
            {
              id: Date.now().toString() + '_REAL',
              label: `✅ ${op.label}`,
              amount: op.amount,
              type: op.type,
              frequency: Frequency.ONCE,
              date: new Date().toISOString().slice(0, 10),
              category: op.category || DEFAULT_CATEGORY,
              tags: op.tags || []
            },
            {
              id: Date.now().toString() + '_OFF',
              label: `Ajustement: ${op.label}`,
              amount: -op.amount,
              type: op.type,
              frequency: Frequency.ONCE,
              date: opDateStr,
              category: op.category || DEFAULT_CATEGORY,
              tags: op.tags || []
            }
          );
          showToast(`"${op.label}" marqué comme payé`, 'success');
        }
        setOperations(newOps);
      };

      const handlePaymentConfirm = (data) => {
        if (!activeTarget) return;
        const { op, monthKey } = activeTarget;
        const newOps = [...operations];
        const baseCat = op.category || DEFAULT_CATEGORY;
        const baseTags = op.tags || [];
        const ts = Date.now().toString();

        // 1. Dépense/recette réelle (cash flow réel)
        newOps.push({
          id: ts + '_PAY',
          label: data.mode === 'ADVANCE' ? `Acompte: ${op.label}` : `✅ ${op.label} (Solde)`,
          amount: data.amount,
          type: op.type,
          frequency: Frequency.ONCE,
          date: data.date,
          category: baseCat,
          tags: baseTags
        });

        // 2. Régularisation selon le mode
        if (data.mode === 'FINAL') {
          // Annule la prévision du mois (régularisation)
          newOps.push({
            id: ts + '_CLOSE',
            label: `Clôture: ${op.label}`,
            amount: -op.amount,
            type: op.type,
            frequency: Frequency.ONCE,
            date: `${monthKey}-01`,
            category: baseCat,
            tags: baseTags
          });
        } else if (data.mode === 'ADVANCE') {
          // Déduit l'acompte du mois cible
          newOps.push({
            id: ts + '_ADV_OFF',
            label: `Déduction Acompte (${op.label})`,
            amount: -data.amount,
            type: op.type,
            frequency: Frequency.ONCE,
            date: `${data.targetMonth}-01`,
            category: baseCat,
            tags: baseTags
          });
        }

        setOperations(newOps);
        setActiveTarget(null);
        showToast(data.mode === 'ADVANCE' ? 'Acompte enregistré' : 'Paiement clôturé', 'success');
      };

      /* ----------------------------------------------------------
         SIMULATION
         ---------------------------------------------------------- */
      const toggleSimulationMode = () => {
        if (isSimulationMode) {
          if (backupState.current) {
            setOperations(backupState.current.operations);
            setStartingBalance(backupState.current.startingBalance);
            setAdjustments(backupState.current.adjustments);
            backupState.current = null;
          }
          setIsSimulationMode(false);
          showToast('Simulation quittée, données restaurées', 'info');
        } else {
          backupState.current = {
            operations: [...operations],
            startingBalance,
            adjustments: { ...adjustments }
          };
          setIsSimulationMode(true);
          showToast('Mode simulation activé', 'info');
        }
      };

      /* ----------------------------------------------------------
         EXPORT / IMPORT
         ---------------------------------------------------------- */
      const handleExport = () => {
        const data = {
          operations,
          startingBalance,
          adjustments,
          defaultCurrency: currency,
          savingsAccounts,
          savingsAdjustments,
          goals,
          safetyMattress,
          criticalThreshold,
          version: '2.2',
          exportDate: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `cashflow_${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('Export téléchargé', 'success');
      };

      const handleExportCSV = () => {
        const rows = [['Libellé', 'Montant EUR', 'Type', 'Fréquence', 'Catégorie', 'Tags', 'Date/Début', 'Fin']];
        operations.forEach(op => {
          if (isTechnicalOperation(op)) return;
          rows.push([
            op.label,
            op.amount,
            op.type,
            op.frequency,
            CATEGORIES[op.category]?.label || op.category || '',
            (op.tags || []).join(';'),
            op.date || op.startDate || '',
            op.endDate || ''
          ]);
        });
        const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `cashflow_${new Date().toISOString().slice(0, 10)}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('Export CSV téléchargé', 'success');
      };

      const handleImportClick = () => { fileInputRef.current?.click(); };

      const handleImportFile = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const raw = JSON.parse(e.target.result);
            const migrated = migrateImportedData(raw);
            if (!migrated.operations || migrated.operations.length === 0) {
              showToast('Aucune opération trouvée dans le fichier', 'error');
              return;
            }
            setPendingImport(migrated);
          } catch (err) {
            showToast('Fichier invalide : ' + err.message, 'error');
          }
        };
        reader.readAsText(file);
        event.target.value = '';
      };

      const handleConfirmImport = (operationsValidated, newDefaultCurrency) => {
        if (!pendingImport) return;
        setOperations(operationsValidated);
        setStartingBalance(pendingImport.startingBalance);
        setAdjustments(pendingImport.adjustments);
        if (newDefaultCurrency) setCurrency(newDefaultCurrency);
        setPendingImport(null);
        showToast(`${operationsValidated.length} opérations importées`, 'success');
      };

      /* ----------------------------------------------------------
         HISTORIQUE
         Non disponible dans cette version Supabase (sera ajouté si besoin).
         La sauvegarde reste sécurisée par le triple filet localStorage + Supabase.
         ---------------------------------------------------------- */
      const handleOpenHistory = () => {
        showToast('Historique des versions non disponible dans cette version. Utilise Export régulièrement pour garder des sauvegardes.', 'info');
      };

      /* ----------------------------------------------------------
         RESET
         ---------------------------------------------------------- */
      const handleResetAll = () => {
        setConfirmDialog({
          title: '⚠️ Tout effacer ?',
          message: 'Cette action supprimera TOUTES tes opérations, ton solde et tes ajustements. Exporte d\'abord si tu veux garder une trace.',
          danger: true,
          confirmText: 'Effacer tout',
          onConfirm: () => {
            setOperations([]);
            setStartingBalance(0);
            setAdjustments({});
            setConfirmDialog(null);
            showToast('Tout a été effacé', 'success');
          }
        });
      };

      /* ----------------------------------------------------------
         CALCULS DÉRIVÉS
         ---------------------------------------------------------- */
      const baseForecast = useMemo(
        () => calculateForecast(startingBalance, operations, adjustments, savingsAccounts, savingsAdjustments),
        [startingBalance, operations, adjustments, savingsAccounts, savingsAdjustments]
      );

      const displayedForecast = useMemo(() => {
        if (currency === 'EUR') return baseForecast;
        return baseForecast.map(m => ({
          ...m,
          startBalance: toView(m.startBalance),
          totalIncome: toView(m.totalIncome),
          totalExpense: toView(m.totalExpense),
          theoreticalEndBalance: toView(m.theoreticalEndBalance),
          adjustedEndBalance: m.adjustedEndBalance !== null ? toView(m.adjustedEndBalance) : null,
          finalEndBalance: toView(m.finalEndBalance),
          safeMargin: toView(m.safeMargin),
          savingsDeposit: toView(m.savingsDeposit || 0),
          savingsCapital: toView(m.savingsCapital || 0),
          patrimoine: toView(m.patrimoine || 0),
          accountsActivity: (m.accountsActivity || []).map(a => ({
            ...a,
            deposit: toView(a.deposit),
            interest: toView(a.interest),
            newBalance: toView(a.newBalance)
          })),
          activeOperations: m.activeOperations.map(op => ({ ...op, amount: toView(op.amount) }))
        }));
      }, [baseForecast, currency]);

      const minBalance = Math.min(...displayedForecast.map(f => f.finalEndBalance));
      const currentMonthData = displayedForecast[0] || { finalEndBalance: 0 };

      // Filtres avancés sur les opérations
      const { mainOps, historyOps, allTags } = useMemo(() => {
        let all = operations;
        if (searchTerm) {
          const lower = searchTerm.toLowerCase();
          all = all.filter(op => op.label.toLowerCase().includes(lower) || (op.tags || []).some(t => t.toLowerCase().includes(lower)));
        }
        if (filterCategory) {
          all = all.filter(op => (op.category || DEFAULT_CATEGORY) === filterCategory);
        }
        if (filterTag) {
          all = all.filter(op => (op.tags || []).includes(filterTag));
        }
        const main = all.filter(op => !isTechnicalOperation(op));
        const history = all.filter(op => isTechnicalOperation(op));
        
        const tagSet = new Set();
        operations.forEach(op => (op.tags || []).forEach(t => tagSet.add(t)));

        return {
          mainOps: main.sort((a, b) => b.amount - a.amount),
          historyOps: history.sort((a, b) => (b.date || '').localeCompare(a.date || '')),
          allTags: Array.from(tagSet).sort()
        };
      }, [operations, searchTerm, filterCategory, filterTag]);

      // Capacité d'épargne LISSÉE (toutes ops récurrentes ramenées au mois, sans filtre date)
      const savingsCapacityLisse = useMemo(() => {
        let income = 0, expense = 0;
        operations.forEach(op => {
          if (isTechnicalOperation(op)) return;
          if (op.frequency === Frequency.ONCE) return;
          let amount = op.amount;
          if (op.frequency === Frequency.QUARTERLY) amount /= 3;
          if (op.frequency === Frequency.ANNUAL) amount /= 12;
          if (op.type === OperationType.INCOME) income += amount;
          else expense += amount;
        });
        return toView(income - expense);
      }, [operations, currency]);

      // Capacité d'épargne ACTUELLE (ops récurrentes actives ce mois précis uniquement)
      const savingsCapacityNow = useMemo(() => {
        const now = new Date();
        const currentYM = generateMonthKey(now);
        let income = 0, expense = 0;
        operations.forEach(op => {
          if (isTechnicalOperation(op)) return;
          if (op.frequency === Frequency.ONCE) return;
          if (!op.startDate) return;
          try {
            const opStart = parseDateLocal(op.startDate);
            const opEnd = op.endDate ? parseDateLocal(op.endDate) : null;
            const startYM = generateMonthKey(opStart);
            const endYM = opEnd ? generateMonthKey(opEnd) : null;
            if (currentYM < startYM) return;
            if (endYM && currentYM > endYM) return;
            let amount = op.amount;
            if (op.frequency === Frequency.QUARTERLY) amount /= 3;
            if (op.frequency === Frequency.ANNUAL) amount /= 12;
            if (op.type === OperationType.INCOME) income += amount;
            else expense += amount;
          } catch (e) { /* skip */ }
        });
        return toView(income - expense);
      }, [operations, currency]);

      // Compatibilité avec ancien code
      const savingsCapacity = savingsCapacityLisse;

      // Épargne effective du mois courant (revenus - dépenses incluant ponctuels)
      const currentMonthSavings = useMemo(() => {
        if (!displayedForecast || !displayedForecast[0]) return 0;
        return displayedForecast[0].totalIncome - displayedForecast[0].totalExpense;
      }, [displayedForecast]);

      // Vue annuelle agrégée
      const yearlyAggregates = useMemo(() => {
        if (!baseForecast) return [];
        const years = {};
        baseForecast.forEach(m => {
          const [y] = m.monthKey.split('-');
          if (!years[y]) {
            years[y] = { 
              year: y, 
              totalIncome: 0, 
              totalExpense: 0, 
              startBalance: m.startBalance,
              endBalance: m.finalEndBalance 
            };
          }
          years[y].totalIncome += m.totalIncome;
          years[y].totalExpense += m.totalExpense;
          years[y].endBalance = m.finalEndBalance;
        });
        return Object.values(years).map(y => ({
          ...y,
          totalIncome: toView(y.totalIncome),
          totalExpense: toView(y.totalExpense),
          startBalance: toView(y.startBalance),
          endBalance: toView(y.endBalance),
          netSavings: toView(y.totalIncome - y.totalExpense)
        }));
      }, [baseForecast, currency]);

      // Top 5 fuites (catégories les plus coûteuses, lissé mensuel)
      const top5Leaks = useMemo(() => {
        const totals = {};
        operations.forEach(op => {
          if (isTechnicalOperation(op)) return;
          if (op.type !== OperationType.EXPENSE) return;
          if (op.frequency === Frequency.ONCE) return;
          let amount = op.amount;
          if (op.frequency === Frequency.QUARTERLY) amount /= 3;
          if (op.frequency === Frequency.ANNUAL) amount /= 12;
          const cat = op.category || DEFAULT_CATEGORY;
          totals[cat] = (totals[cat] || 0) + amount;
        });
        const totalExpense = Object.values(totals).reduce((s, v) => s + v, 0);
        return Object.entries(totals)
          .map(([catId, val]) => ({
            catId,
            cat: CATEGORIES[catId] || CATEGORIES.AUTRE,
            value: toView(val),
            pct: totalExpense > 0 ? Math.round(val / totalExpense * 100) : 0
          }))
          .sort((a, b) => b.value - a.value)
          .slice(0, 5);
      }, [operations, currency]);

      // Comparaison N vs N-1 par catégorie
      const yearComparison = useMemo(() => {
        const currentYear = new Date().getFullYear();
        const prevYear = currentYear - 1;
        const byYearCat = { [currentYear]: {}, [prevYear]: {} };
        
        if (!baseForecast) return { current: currentYear, previous: prevYear, data: [] };
        
        baseForecast.forEach(m => {
          const [y] = m.monthKey.split('-');
          const yearNum = parseInt(y);
          if (yearNum !== currentYear && yearNum !== prevYear) return;
          m.activeOperations.forEach(op => {
            if (isTechnicalOperation(op)) return;
            if (op.type !== OperationType.EXPENSE) return;
            const cat = op.category || DEFAULT_CATEGORY;
            byYearCat[yearNum][cat] = (byYearCat[yearNum][cat] || 0) + op.amount;
          });
        });

        const allCats = new Set([...Object.keys(byYearCat[currentYear]), ...Object.keys(byYearCat[prevYear])]);
        const data = Array.from(allCats).map(cat => {
          const curr = byYearCat[currentYear][cat] || 0;
          const prev = byYearCat[prevYear][cat] || 0;
          return {
            catId: cat,
            cat: CATEGORIES[cat] || CATEGORIES.AUTRE,
            current: toView(curr),
            previous: toView(prev),
            delta: curr - prev,
            pctChange: prev > 0 ? ((curr - prev) / prev * 100) : (curr > 0 ? 100 : 0)
          };
        }).sort((a, b) => b.current - a.current);

        return { current: currentYear, previous: prevYear, data };
      }, [baseForecast, currency]);

      // Détection point bas critique dans les 6 prochains mois
      const criticalPointBas = useMemo(() => {
        if (!displayedForecast) return null;
        const next6 = displayedForecast.slice(0, 6);
        const min = next6.reduce((m, c) => c.finalEndBalance < m.finalEndBalance ? c : m, next6[0]);
        return min;
      }, [displayedForecast]);

      const getFrequencyLabel = (op) => {
        if (op.frequency === Frequency.ONCE) return `Le ${op.date}`;
        if (op.frequency === Frequency.QUARTERLY) return 'Trimestriel';
        if (op.frequency === Frequency.ANNUAL) return 'Annuel';
        return 'Mensuel';
      };

      // Tant qu'on n'a pas vérifié la session, écran neutre (évite un flash du login screen)
      if (!authChecked) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50 text-blue-600 flex-col gap-4">
            <Loader2 size={48} />

      }

        return (

            <Loader2 size={48} />

         RENDU UI

              <div className="flex gap-1">

            {/* COMPTE CONNECTÉ */}

              <button

                  className={`text-[10px] px-2 py-1 rounded-full font-medium ${!filterCategory ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}

                      style={isActive ? { backgroundColor: cat.color, color: 'white', borderColor: cat.color } : { backgroundColor: cat.color + '15', color: cat.color, borderColor: 'transparent' }}
                    >
                      <span>{cat.icon}</span> {count}
                    </button>

              </div>
              {filterTag && (

                  </button>

            {/* LISTE D'OPÉRATIONS */}
            <div className="flex-1 overflow-y-auto p-4 space-y-2 pb-24 md:pb-4">

              {operations.length > 0 && mainOps.length === 0 && historyOps.length === 0 && (

              )}

              {mainOps.map(op => (
                <div

                >
                  <div className="min-w-0 flex-1">

                    <div className="flex items-center gap-2 mt-1 flex-wrap">
                      <CategoryChip catId={op.category || DEFAULT_CATEGORY} size="xs"/>
                      <span className="text-[10px] text-slate-400">{getFrequencyLabel(op)}</span>
                      {(op.tags || []).slice(0, 2).map(t => (
                        <button

                <div className="pt-3 mt-3 border-t border-slate-200">

                    {showHistory ? <ChevronUp size={12}/> : <ChevronDown size={12}/>}
                  </button>
                  {showHistory && (
                    <div className="mt-2 space-y-1 animate-in">

                        <div key={op.id} onClick={() => { setEditingOperation(op); setIsFormOpen(true); }} className="flex justify-between items-center p-2 bg-slate-50/50 rounded border border-slate-100 hover:bg-white cursor-pointer opacity-80 hover:opacity-100">

                      onConfirm: (val) => {
                        const num = parseFloat(val);
                        if (!isNaN(num)) {
                          setCriticalThreshold(num / rate);
                          showToast('Seuil mis à jour', 'success');
                        }
                        setPromptDialog(null);
                      }
                    });
                  }}
                />
              )}

              {/* VUE PRINCIPALE */}
              {activeView === 'main' && (
                <>
                  <div className="grid grid-cols-1 xl:grid-cols-5 gap-4">
                    <div className="xl:col-span-3">
                      <ForecastChart data={displayedForecast} isSimulation={isSimulationMode} currency={currency} />
                    </div>
                    {showAnalytics && operations.length > 0 && (
                      <div className="xl:col-span-2">
                        <CategoryPieChart operations={operations} currency={currency} />
                      </div>
                    )}
                  </div>

                  {operations.length > 0 && (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <MonthSavingsCard 
                        actual={currentMonthSavings}
                        average={savingsCapacityLisse}
                        currency={currency}
                      />
                      <TopLeaksCard leaks={top5Leaks} currency={currency} />
                    </div>
                  )}

                  <ForecastTable 
                    data={displayedForecast} 
                    onAdjustment={handleAdjustment} 
                    onSavingsAdjustment={handleSavingsAdjustment}
                    isSimulation={isSimulationMode} 
                    currency={currency}
                  />
                </>
              )}

              {/* VUE ANNUELLE */}
              {activeView === 'yearly' && (
                <div className="space-y-4">
                  <YearlyView data={yearlyAggregates} currency={currency} />
                  <YearComparisonView comparison={yearComparison} currency={currency} />
                </div>
              )}

              {/* VUE ÉPARGNE */}
              {activeView === 'savings' && (
                <SavingsView 
                  forecast={baseForecast}
                  currency={currency}
                  safetyMattress={safetyMattress}
                  setSafetyMattress={setSafetyMattress}
                  savingsCapacityLisse={savingsCapacityLisse}
                  savingsAccounts={savingsAccounts}
                  onAddAccount={() => { setEditingAccount(null); setIsAccountFormOpen(true); }}
                  onEditAccount={(a) => { setEditingAccount(a); setIsAccountFormOpen(true); }}
                  whatIfAmount={whatIfAmount}
                  setWhatIfAmount={setWhatIfAmount}
                  whatIfRate={whatIfRate}
                  setWhatIfRate={setWhatIfRate}
                  whatIfYears={whatIfYears}
                  setWhatIfYears={setWhatIfYears}
                />
              )}

              {/* VUE OBJECTIFS */}
              {activeView === 'goals' && (
                <GoalsView 
                  goals={goals}
                  savingsCapacityNow={savingsCapacityNow}
                  currency={currency}
                  onEdit={(g) => { setEditingGoal(g); setIsGoalFormOpen(true); }}
                  onAdd={() => { setEditingGoal(null); setIsGoalFormOpen(true); }}
                />
              )}
            </div>
          </main>

          {/* MODALS */}
          {isFormOpen && (
            <OperationForm 
              key={editingOperation ? editingOperation.id : 'new'}
              initialData={editingOperation || undefined} 
              onSave={handleSaveOperation} 
              onDelete={handleDeleteOperation} 
              onDuplicate={handleDuplicateOperation}
              onClose={() => { setIsFormOpen(false); setEditingOperation(null); }} 
              currency={currency} 
            />
          )}

          {isTrackerOpen && (
            <MonthTrackerModal 
              operations={operations}
              onClose={() => setIsTrackerOpen(false)}
              onAction={handleTrackerAction}
              currency={currency}
            />
          )}

          {activeTarget && (
            <PaymentModal 
              target={activeTarget}
              onClose={() => setActiveTarget(null)}
              onConfirm={handlePaymentConfirm}
              currency={currency}
            />
          )}

          {isAccountFormOpen && (
            <SavingsAccountForm 
              initialData={editingAccount}
              onSave={handleSaveAccount}
              onDelete={handleDeleteAccount}
              onClose={() => { setIsAccountFormOpen(false); setEditingAccount(null); }}
              currency={currency}
            />
          )}

          {isGoalFormOpen && (
            <GoalForm 
              initialData={editingGoal}
              onSave={handleSaveGoal}
              onDelete={handleDeleteGoal}
              onClose={() => { setIsGoalFormOpen(false); setEditingGoal(null); }}
              currency={currency}
            />
          )}

          {pendingImport && (
            <CategoryReviewModal 
              operations={pendingImport.operations}
              currency={currency}
              currentDefaultCurrency={currency}
              onConfirm={handleConfirmImport}
              onClose={() => setPendingImport(null)}
            />
          )}

          {confirmDialog && (
            <ConfirmModal 
              {...confirmDialog}
              onCancel={() => setConfirmDialog(null)}
            />
          )}

          {promptDialog && (
            <PromptModal 
              {...promptDialog}
              onCancel={() => setPromptDialog(null)}
            />
          )}

          {toast && (
            <Toast 
              key={toast.id}
              msg={toast.msg} 
              type={toast.type} 
              onClose={() => setToast(null)} 
            />
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
