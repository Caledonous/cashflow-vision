  <script>
    // Capture les erreurs JS globales pour affichage clair au lieu d'un blocage silencieux
    window.__cfvErrors = [];
    window.addEventListener('error', function(e) {
      window.__cfvErrors.push((e.message || 'Erreur inconnue') + (e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : ''));
    });

    // Watchdog : si l'app React ne s'est pas montée après 8s, afficher un diagnostic
    setTimeout(function() {
      var root = document.getElementById('root');
      if (root && root.querySelector('.animate-spin')) {
        var errList = window.__cfvErrors.length > 0 
          ? '<ul style="text-align:left;font-size:11px;color:#dc2626;margin-top:12px;max-width:480px;">' + 
            window.__cfvErrors.map(function(e){ return '<li>' + e + '</li>'; }).join('') + '</ul>'
          : '<p style="font-size:12px;color:#94a3b8;margin-top:8px;">Aucune erreur JS détectée — le souci vient peut-être d\'une ressource externe (CDN) qui ne charge pas.</p>';
        root.innerHTML = 
          '<div style="max-width:520px;text-align:center;padding:20px;">' +
          '<div style="font-size:32px;margin-bottom:12px;">⚠️</div>' +
          '<div style="font-weight:bold;color:#1e293b;margin-bottom:8px;">Le chargement prend trop de temps</div>' +
          '<div style="font-size:13px;color:#64748b;">Une ressource (React, Recharts, ou Tailwind) n\'a peut-être pas chargé correctement.</div>' +
          errList +
          '<button onclick="location.reload()" style="margin-top:16px;background:#2563eb;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;">Recharger la page</button>' +
          '<div style="margin-top:12px;font-size:11px;color:#cbd5e1;">Si le problème persiste, essaie en navigation privée ou un autre navigateur.</div>' +
          '</div>';
      }
    }, 8000);
  </script>

    /* ============================================================
       CONSTANTES MÉTIER

    const OperationType = { INCOME: 'INCOME', EXPENSE: 'EXPENSE' };
    const Frequency = { ONCE: 'ONCE', MONTHLY: 'MONTHLY', QUARTERLY: 'QUARTERLY', ANNUAL: 'ANNUAL' };

    // Taxonomie de catégories - chacune avec une couleur cohérente
    const CATEGORIES = {
      LOGEMENT:   { id: 'LOGEMENT',   label: 'Logement',    color: '#2563eb', icon: '🏠' },

    const CATEGORY_LIST = Object.values(CATEGORIES);
    const DEFAULT_CATEGORY = 'AUTRE';

    /* ============================================================
       AUTO-CATÉGORISATION
       Règles basées sur les mots-clés des libellés.
       Ordre = priorité (la première règle qui matche gagne).
       ============================================================ */
    const AUTO_CAT_RULES = [
      // Salaires & revenus
      { match: /salaire|augmentation/i, cat: 'SALAIRE' },
      { match: /r[ée]duction|remboursement/i, cat: 'SALAIRE' },
      // Impôts
      { match: /imp[oô]ts?|taxe|surplus imp/i, cat: 'IMPOTS' },
      // Crédits & frais bancaires
      { match: /cr[ée]dit|emprunt|pr[eê]t/i, cat: 'CREDITS' },
      { match: /frais bancaire|agios/i, cat: 'CREDITS' },
      // Logement
      { match: /loyer|sci|charges?\s*\(|eau|elec|électricit|gaz|assurance appart|d[ée]m[ée]nag/i, cat: 'LOGEMENT' },

      // Alimentation
      { match: /bouffe|repas|courses|nourriture|alim|march[ée]/i, cat: 'ALIMENTATION' },
      // Vacances & voyages
      { match: /vacances?|voyage|billet|thaïlande|thailande|wallis|ouv[ée]a|po[ée]/i, cat: 'VACANCES' },

      { match: /abonnement|protonmail|spotify|netflix|portable|t[ée]l[ée]phone|esth[ée]tic|coif|sport/i, cat: 'LOISIRS' },

      { match: /unicef|don/i, cat: 'AUTRE' },
      { match: /sant[ée]/i, cat: 'FAMILLE' }
    ];

    const autoCategorize = (label) => {
      if (!label) return DEFAULT_CATEGORY;
      for (const rule of AUTO_CAT_RULES) {
        if (rule.match.test(label)) return rule.cat;
      }
      return DEFAULT_CATEGORY;

    /* ============================================================
       UTILS DATE & FORMAT
       ============================================================ */
    const formatCurrency = (amount, currency = 'EUR') => {
      return new Intl.NumberFormat('fr-FR', { 
        style: 'currency', 
        currency: currency === 'EUR' ? 'EUR' : 'XPF', 
        minimumFractionDigits: 0, 
        maximumFractionDigits: 0 
      }).format(amount).replace('XPF', 'F');
    };

    const generateMonthKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    const addMonths = (date, months) => { const d = new Date(date); d.setMonth(d.getMonth() + months); return d; };
    const parseDateLocal = (dateStr) => { const [y, m, d] = dateStr.split('-').map(Number); return new Date(y, m - 1, d); };
    const formatRelativeTime = (ts) => {
      if (!ts) return 'jamais';
      const diff = Date.now() - ts;
      const sec = Math.floor(diff / 1000);
      if (sec < 60) return 'à l\'instant';
      const min = Math.floor(sec / 60);
      if (min < 60) return `il y a ${min} min`;
      const h = Math.floor(min / 60);
      if (h < 24) return `il y a ${h}h`;
      const d = Math.floor(h / 24);
      return `il y a ${d}j`;
    };

    const isTechnicalOperation = (op) => {
      const technicalPrefixes = ['Ajustement:', 'Annulé:', 'Clôture:', 'Déduction', 'Réalisé:', '✅', 'Acompte:'];
      return technicalPrefixes.some(prefix => op.label.startsWith(prefix));
    };

    /* ============================================================
       CALCUL DU FORECAST (logique préservée de V1)
       ============================================================ */
    const calculateForecast = (initialBalance, operations, adjustments, savingsAccounts = [], savingsAdjustments = {}) => {
      const forecast = [];
      let currentBalance = initialBalance;
      let currentDate = new Date();
      currentDate.setDate(1); 
      
      const MONTHS_TO_FORECAST = 120;

      // État courant de chaque poche d'épargne (clé = id)
      const accountBalances = {};
      savingsAccounts.forEach(acc => {
        accountBalances[acc.id] = acc.balance || 0;
      });

      // Helper : la poche est-elle active ce mois (entre startDate et endDate) ?
      const isAccountActive = (acc, monthKey) => {
        if (!acc.startDate) return true; // si pas de date début, toujours active
        try {
          const accStart = parseDateLocal(acc.startDate);
          const accEnd = acc.endDate ? parseDateLocal(acc.endDate) : null;
          const startYM = generateMonthKey(accStart);
          const endYM = accEnd ? generateMonthKey(accEnd) : null;
          if (monthKey < startYM) return false;
          if (endYM && monthKey > endYM) return false;
          return true;
        } catch (e) { return false; }
      };

      for (let i = 0; i < MONTHS_TO_FORECAST; i++) {
        const monthKey = generateMonthKey(currentDate);
        let income = 0;
        let expense = 0;
        const activeOps = [];

        operations.forEach(op => {
          let isActive = false;
          const opDate = op.date ? parseDateLocal(op.date) : null;
          const opStart = op.startDate ? parseDateLocal(op.startDate) : null;
          const opEnd = op.endDate ? parseDateLocal(op.endDate) : null;

          if (op.frequency === Frequency.ONCE && opDate) {
            if (opDate.getMonth() === currentDate.getMonth() && opDate.getFullYear() === currentDate.getFullYear()) isActive = true;
          } else if (op.frequency !== Frequency.ONCE && opStart) {
            const currentYM = generateMonthKey(currentDate);
            const startYM = generateMonthKey(opStart);
            const endYM = opEnd ? generateMonthKey(opEnd) : null;

            if (currentYM >= startYM && (!endYM || currentYM <= endYM)) {
              const diffYear = currentDate.getFullYear() - opStart.getFullYear();
              const diffMonth = currentDate.getMonth() - opStart.getMonth();
              const totalMonthsDiff = (diffYear * 12) + diffMonth;
              if (op.frequency === Frequency.MONTHLY) isActive = true;
              else if (op.frequency === Frequency.QUARTERLY) isActive = (totalMonthsDiff % 3 === 0);
              else if (op.frequency === Frequency.ANNUAL) isActive = (totalMonthsDiff % 12 === 0);
            }
          }

          if (isActive) {
            activeOps.push(op);
            if (op.type === OperationType.INCOME) income += op.amount;
            else expense += op.amount;
          }
        });

        // === VERSEMENTS POCHES D'ÉPARGNE (ajoutés aux dépenses du compte courant) ===
        let totalSavingsDeposit = 0;
        const accountsActivity = []; // détail pour le modal
        savingsAccounts.forEach(acc => {
          if (!isAccountActive(acc, monthKey)) return;
          const deposit = acc.monthlyDeposit || 0;
          totalSavingsDeposit += deposit;
          
          // Capitalisation (intérêts composés mensuels) - APPLIQUÉ avant ajout du versement
          const monthlyRate = ((acc.annualRate || 0) / 100) / 12;
          const interestEarned = accountBalances[acc.id] * monthlyRate;
          accountBalances[acc.id] = accountBalances[acc.id] * (1 + monthlyRate) + deposit;
          
          accountsActivity.push({
            id: acc.id,
            name: acc.name,
            type: acc.type,
            deposit,
            interest: interestEarned,
            newBalance: accountBalances[acc.id]
          });
        });

        expense += totalSavingsDeposit;
        if (totalSavingsDeposit > 0) {
          // Ajouter une "opération virtuelle" pour visibilité dans le détail
          activeOps.push({
            id: '__savings_deposit_' + monthKey,
            label: `💰 Versement épargne (auto)`,
            amount: totalSavingsDeposit,
            type: OperationType.EXPENSE,
            frequency: Frequency.MONTHLY,
            category: 'EPARGNE',
            tags: [],
            isVirtual: true
          });
        }

        // === AJUSTEMENT MANUEL DU CAPITAL ÉPARGNÉ ===
        // savingsAdjustments[monthKey] = { accId: newValue }
        const monthSavingsAdj = savingsAdjustments[monthKey];
        if (monthSavingsAdj) {
          Object.entries(monthSavingsAdj).forEach(([accId, val]) => {
            if (accountBalances[accId] !== undefined) {
              accountBalances[accId] = val;
            }
          });
        }

        // Total capital épargné ce mois
        const totalSavingsCapital = Object.values(accountBalances).reduce((s, v) => s + v, 0);
        
        const events = [];
        operations.forEach(op => {
          if (isTechnicalOperation(op)) return;
          const opStartYM = op.startDate ? op.startDate.substring(0, 7) : null;
          const opEndYM = op.endDate ? op.endDate.substring(0, 7) : null;
          if (op.frequency !== Frequency.ONCE && opStartYM === monthKey) events.push({ label: `Début ${op.label}`, type: 'START', op: op });
          if (op.frequency !== Frequency.ONCE && opEndYM === monthKey) events.push({ label: `Fin ${op.label}`, type: 'END', op: op });
          if (op.frequency === Frequency.ONCE) {
            const opDate = op.date ? parseDateLocal(op.date) : null;
            if (opDate && opDate.getMonth() === currentDate.getMonth() && opDate.getFullYear() === currentDate.getFullYear()) {
              events.push({ label: op.label, type: 'ONCE', op: op });
            }
          }
          if (op.frequency !== Frequency.ONCE) {
            const opStart = op.startDate ? parseDateLocal(op.startDate) : null;
            const opEnd = op.endDate ? parseDateLocal(op.endDate) : null;
            if (opStart) {
              const diffYear = currentDate.getFullYear() - opStart.getFullYear();
              const diffMonth = currentDate.getMonth() - opStart.getMonth();
              const totalMonthsDiff = (diffYear * 12) + diffMonth;
              const currentYM = generateMonthKey(currentDate);
              const startYM = generateMonthKey(opStart);
              const endYM = opEnd ? generateMonthKey(opEnd) : null;
              if (currentYM >= startYM && (!endYM || currentYM <= endYM)) {
                if (op.frequency === Frequency.QUARTERLY && totalMonthsDiff % 3 === 0) events.push({ label: op.label, type: 'OCCURRENCE', op: op });
                else if (op.frequency === Frequency.ANNUAL && totalMonthsDiff % 12 === 0) events.push({ label: op.label, type: 'OCCURRENCE', op: op });
              }
            }
          }
        });

        const theoreticalEnd = currentBalance + income - expense;
        const adjustment = adjustments[monthKey];
        const hasAdjustment = adjustment !== undefined;
        const finalEnd = hasAdjustment ? adjustment : theoreticalEnd;

        forecast.push({
          monthKey,
          label: new Intl.DateTimeFormat('fr-FR', { month: 'short', year: '2-digit' }).format(currentDate),
          startBalance: currentBalance,
          totalIncome: income,
          totalExpense: expense,
          theoreticalEndBalance: theoreticalEnd,
          adjustedEndBalance: hasAdjustment ? adjustment : null,
          finalEndBalance: finalEnd,
          // === Nouvelles propriétés liées à l'épargne ===
          savingsDeposit: totalSavingsDeposit,
          savingsCapital: totalSavingsCapital,
          patrimoine: finalEnd + totalSavingsCapital,
          accountsActivity: accountsActivity,
          accountSnapshot: { ...accountBalances },
          // ===========
          events: events,
          activeOperations: activeOps, 
          safeMargin: 0 
        });
        currentBalance = finalEnd;
        currentDate = addMonths(currentDate, 1);
      }

      let futureMin = Infinity;
      for (let i = forecast.length - 1; i >= 0; i--) {
        futureMin = Math.min(futureMin, forecast[i].finalEndBalance);
        forecast[i].safeMargin = futureMin;
      }

      return forecast;
    };

    /* ============================================================
       IMPORT / MIGRATION DEPUIS L'ANCIEN FORMAT
       Accepte :
         - V2 (nouveau format avec opérations + catégories + tags directs)
         - V1 (avec "scenarios" : on prend le currentScenarioId ou le premier)
         - JSON brut avec "operations" à la racine
       ============================================================ */
    const migrateImportedData = (raw) => {
      let ops = [];
      let bal = 0;
      let adj = {};

      // Format V2 direct
      if (raw.operations && !raw.scenarios) {
        ops = raw.operations;
        bal = raw.startingBalance || 0;
        adj = raw.adjustments || {};
      }
      // Format V1 avec scenarios : on prend le scénario actif
      else if (raw.scenarios) {
        const targetId = raw.currentScenarioId || Object.keys(raw.scenarios)[0];
        const scen = raw.scenarios[targetId];
        if (scen) {
          ops = scen.operations || [];
          bal = scen.startingBalance || 0;
          adj = scen.adjustments || {};
        }
      }

      // S'assurer que chaque opération a category et tags
      ops = ops.map(op => ({
        ...op,
        category: op.category || autoCategorize(op.label),
        tags: op.tags || []
      }));

      return { operations: ops, startingBalance: bal, adjustments: adj };
    };

    /* ============================================================
       MODAL DE CONFIRMATION (remplace confirm() natif)
       ============================================================ */
    const ConfirmModal = ({ title, message, onConfirm, onCancel, confirmText = 'Confirmer', danger = false }) => {
      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[80] p-4 animate-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden animate-zoom">
            <div className="p-5 border-b border-slate-100">
              <h3 className="font-bold text-slate-800 flex items-center gap-2">
                {danger ? <AlertTriangle size={18} className="text-rose-500"/> : <Info size={18} className="text-blue-500"/>}
                {title}
              </h3>
            </div>
            <div className="p-5 text-sm text-slate-600">{message}</div>
            <div className="p-4 bg-slate-50 flex gap-2 justify-end">
              <button onClick={onCancel} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-200 rounded-lg">Annuler</button>
              <button 
                onClick={onConfirm} 
                className={`px-4 py-2 text-sm text-white rounded-lg ${danger ? 'bg-rose-600 hover:bg-rose-700' : 'bg-blue-600 hover:bg-blue-700'}`}
              >
                {confirmText}
              </button>
            </div>
          </div>
        </div>
      );
    };

    /* ============================================================
       MODAL DE SAISIE TEXTE (remplace prompt() natif)
       ============================================================ */
    const PromptModal = ({ title, message, defaultValue = '', onConfirm, onCancel, confirmText = 'OK' }) => {
      const [value, setValue] = useState(defaultValue);
      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[80] p-4 animate-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden animate-zoom">
            <div className="p-5 border-b border-slate-100">
              <h3 className="font-bold text-slate-800">{title}</h3>
            </div>
            <div className="p-5">
              {message && <p className="text-sm text-slate-600 mb-3">{message}</p>}
              <input
                autoFocus
                type="text"
                value={value}
                onChange={(e) => setValue(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter') onConfirm(value); if (e.key === 'Escape') onCancel(); }}
                className="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500"
              />
            </div>
            <div className="p-4 bg-slate-50 flex gap-2 justify-end">
              <button onClick={onCancel} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-200 rounded-lg">Annuler</button>
              <button onClick={() => onConfirm(value)} className="px-4 py-2 text-sm bg-blue-600 text-white hover:bg-blue-700 rounded-lg">{confirmText}</button>
            </div>
          </div>
        </div>
      );
    };

    /* ============================================================
       TOAST NOTIFICATIONS
       ============================================================ */
    const Toast = ({ msg, type, onClose }) => {
      useEffect(() => {
        const t = setTimeout(onClose, 3500);
        return () => clearTimeout(t);
      }, [onClose]);
      const bgColor = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-rose-600' : 'bg-slate-800';
      return (
        <div className={`fixed top-4 right-4 z-[90] px-4 py-3 rounded-lg shadow-lg text-white text-sm flex items-center gap-2 animate-in ${bgColor} max-w-xs`}>
          {type === 'success' && <Check size={16}/>}
          {type === 'error' && <AlertTriangle size={16}/>}
          {type === 'info' && <Info size={16}/>}
          <span>{msg}</span>
        </div>
      );
    };

    /* ============================================================
       CHIP DE CATÉGORIE
       ============================================================ */
    const CategoryChip = ({ catId, size = 'sm' }) => {
      const cat = CATEGORIES[catId] || CATEGORIES.AUTRE;
      const cls = size === 'xs' ? 'text-[10px] px-1.5 py-0.5' : 'text-xs px-2 py-0.5';
      return (
        <span 
          className={`inline-flex items-center gap-1 ${cls} rounded-full font-medium`}
          style={{ backgroundColor: cat.color + '20', color: cat.color }}
        >
          <span className="cat-dot" style={{ backgroundColor: cat.color }}></span>
          {cat.label}
        </span>
      );
    };

    /* ============================================================
       FORMULAIRE D'OPÉRATION (avec catégorie + tags)
       ============================================================ */
    const OperationForm = ({ initialData, onSave, onDelete, onDuplicate, onClose, currency }) => {
      const rate = currency === 'XPF' ? RATE_EUR_XPF : 1;
      const toView = (v) => v * rate;
      const fromView = (v) => v / rate;

      const [label, setLabel] = useState(initialData?.label || '');
      const [amount, setAmount] = useState(initialData ? Math.round(toView(initialData.amount)) : '');
      const [type, setType] = useState(initialData?.type || OperationType.EXPENSE);
      const [frequency, setFrequency] = useState(initialData?.frequency || Frequency.MONTHLY);
      const [date, setDate] = useState(initialData?.date || new Date().toISOString().slice(0, 10));
      const [startDate, setStartDate] = useState(initialData?.startDate || new Date().toISOString().slice(0, 10));
      const [endDate, setEndDate] = useState(initialData?.endDate || '');
      const [category, setCategory] = useState(initialData?.category || DEFAULT_CATEGORY);
      const [tagsInput, setTagsInput] = useState(initialData?.tags?.join(', ') || '');

      // Auto-suggest catégorie quand le label change (uniquement à la création)
      useEffect(() => {
        if (!initialData && label.length > 2) {
          const suggested = autoCategorize(label);
          if (suggested !== DEFAULT_CATEGORY) setCategory(suggested);
        }
      }, [label, initialData]);

      const handleSubmit = () => {
        if (!label.trim() || !amount) return;
        const tags = tagsInput.split(',').map(t => t.trim()).filter(Boolean);
        const op = {
          id: initialData?.id || (Date.now().toString(36) + Math.random().toString(36).slice(2, 9)),
          label: label.trim(),
          amount: fromView(parseFloat(amount)),
          type,
          frequency,
          category,
          tags
        };
        if (frequency === Frequency.ONCE) {
          op.date = date;
        } else {
          op.startDate = startDate;
          if (endDate) op.endDate = endDate;
        }
        onSave(op);
      };

      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[70] p-4 animate-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh] animate-zoom">
            <div className="p-4 border-b border-slate-100 flex justify-between items-center shrink-0">
              <h3 className="font-bold text-slate-800">{initialData ? 'Modifier' : 'Nouvelle opération'}</h3>
              <button onClick={onClose} className="p-1 text-slate-400 hover:text-slate-600 rounded-full hover:bg-slate-100"><X size={20}/></button>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-3">
              <div>
                <label className="text-xs font-medium text-slate-500 uppercase">Libellé</label>
                <input autoFocus type="text" value={label} onChange={(e) => setLabel(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1" placeholder="Ex: Salaire, Loyer..." />
              </div>

              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs font-medium text-slate-500 uppercase">Montant ({currency})</label>
                  <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1" />
                </div>
                <div>
                  <label className="text-xs font-medium text-slate-500 uppercase">Type</label>
                  <select value={type} onChange={(e) => setType(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1 bg-white">
                    <option value={OperationType.EXPENSE}>Dépense</option>
                    <option value={OperationType.INCOME}>Revenu</option>
                  </select>
                </div>
              </div>

              <div>
                <label className="text-xs font-medium text-slate-500 uppercase">Catégorie</label>
                <div className="grid grid-cols-3 gap-1.5 mt-1">
                  {CATEGORY_LIST.map(cat => (
                    <button
                      key={cat.id}
                      type="button"
                      onClick={() => setCategory(cat.id)}
                      className={`p-2 rounded-lg text-xs font-medium flex items-center gap-1 justify-center border transition-all ${category === cat.id ? 'shadow-md scale-105 ring-2 ring-offset-1' : 'bg-slate-50 border-slate-200 hover:bg-white'}`}
                      style={category === cat.id ? { backgroundColor: cat.color + '20', borderColor: cat.color, color: cat.color, '--tw-ring-color': cat.color } : {}}
                    >
                      <span>{cat.icon}</span> {cat.label}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label className="text-xs font-medium text-slate-500 uppercase flex items-center gap-1"><Tag size={10}/> Tags (séparés par virgule)</label>
                <input type="text" value={tagsInput} onChange={(e) => setTagsInput(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1" placeholder="ex: 2027, voyage, kez" />
              </div>

              <div>
                <label className="text-xs font-medium text-slate-500 uppercase">Fréquence</label>
                <select value={frequency} onChange={(e) => setFrequency(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1 bg-white">
                  <option value={Frequency.MONTHLY}>Mensuel</option>
                  <option value={Frequency.QUARTERLY}>Trimestriel</option>
                  <option value={Frequency.ANNUAL}>Annuel</option>
                  <option value={Frequency.ONCE}>Ponctuel</option>
                </select>
              </div>

              {frequency === Frequency.ONCE ? (
                <div>
                  <label className="text-xs font-medium text-slate-500 uppercase">Date</label>
                  <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1" />
                </div>
              ) : (
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs font-medium text-slate-500 uppercase">Début</label>
                    <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1" />
                  </div>
                  <div>
                    <label className="text-xs font-medium text-slate-500 uppercase">Fin (optionnel)</label>
                    <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg mt-1" />
                  </div>
                </div>
              )}
            </div>
            <div className="p-4 border-t border-slate-100 bg-slate-50 flex gap-2 shrink-0 flex-wrap">
              {initialData && <button onClick={() => onDelete(initialData.id)} className="px-3 py-2 text-sm text-rose-600 hover:bg-rose-50 rounded-lg flex items-center gap-1"><Trash2 size={14}/> Supprimer</button>}
              {initialData && onDuplicate && <button onClick={() => onDuplicate(initialData)} className="px-3 py-2 text-sm text-purple-600 hover:bg-purple-50 rounded-lg flex items-center gap-1"><Plus size={14}/> Dupliquer</button>}
              <button onClick={onClose} className="flex-1 px-3 py-2 text-sm text-slate-600 hover:bg-slate-200 rounded-lg">Annuler</button>
              <button onClick={handleSubmit} className="flex-1 px-3 py-2 text-sm bg-blue-600 text-white hover:bg-blue-700 rounded-lg font-medium">Enregistrer</button>
            </div>
          </div>
        </div>
      );
    };

    /* ============================================================
       GRAPHIQUE PRINCIPAL : SOLDE PRÉVISIONNEL
       ============================================================ */
    const ForecastChart = ({ data, isSimulation, currency }) => {
      const [showAll, setShowAll] = useState(false);
      if (!RechartsLib) return <div className="p-4 text-red-600 border border-red-200 bg-red-50 rounded-lg">Erreur chargement graph</div>;
      const visibleData = showAll ? data : data.slice(0, 24);
      return (
        <div className={`h-[280px] md:h-[340px] w-full bg-white p-2 md:p-4 rounded-xl border shadow-sm flex flex-col shrink-0 ${isSimulation ? 'border-amber-300 shadow-amber-100' : 'border-slate-200'}`}>
          <div className="flex justify-between items-center mb-2">
            <h3 className={`text-xs md:text-sm font-semibold uppercase tracking-wider ${isSimulation ? 'text-amber-600' : 'text-slate-500'}`}>
              {isSimulation ? "Projection (Simulation)" : `Projection (${showAll ? '10 ans' : '2 ans'})`}
            </h3>
            <button onClick={() => setShowAll(!showAll)} className="text-[10px] flex items-center gap-1 px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded border border-slate-200 text-slate-600">
              {showAll ? <ZoomIn size={12}/> : <ZoomOut size={12}/>}
              {showAll ? 'Réduire' : 'Voir 10 ans'}
            </button>
          </div>
          <div className="flex-1 min-h-0">
            <ResponsiveContainer width="100%" height="100%">
              <AreaChart data={visibleData} margin={{ top: 5, right: 0, left: -20, bottom: 0 }}>
                <defs>
                  <linearGradient id="colorBalance" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor={isSimulation ? "#f59e0b" : "#3b82f6"} stopOpacity={0.8}/>
                    <stop offset="95%" stopColor={isSimulation ? "#f59e0b" : "#3b82f6"} stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                <XAxis dataKey="label" tick={{fontSize: 10}} tickMargin={5} stroke="#94a3b8" minTickGap={30} />
                <YAxis tick={{fontSize: 10}} stroke="#94a3b8" tickFormatter={(value) => currency === 'EUR' ? `${(value / 1000).toFixed(0)}k€` : `${(value / 1000).toFixed(0)}k`} />
                <Tooltip formatter={(value) => [formatCurrency(value, currency), "Solde"]} contentStyle={{ borderRadius: '8px', border: 'none', fontSize: '12px', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }}/>
                <ReferenceLine y={0} stroke="#64748b" strokeDasharray="3 3" />
                <Area type="monotone" dataKey="finalEndBalance" stroke={isSimulation ? "#f59e0b" : "#3b82f6"} fillOpacity={1} fill="url(#colorBalance)" />
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>
      );
    };

    /* ============================================================
       CAMEMBERT : DÉPENSES PAR CATÉGORIE (mois courant)
       ============================================================ */
    const CategoryPieChart = ({ operations, currency }) => {
      const rate = currency === 'XPF' ? RATE_EUR_XPF : 1;
      if (!RechartsLib) return null;
      
      // Calcul mensualisé par catégorie (toutes les dépenses récurrentes lissées)
      const data = useMemo(() => {
        const totals = {};
        operations.forEach(op => {
          if (isTechnicalOperation(op)) return;
          if (op.type !== OperationType.EXPENSE) return;
          if (op.frequency === Frequency.ONCE) return;
          let amount = op.amount;
          if (op.frequency === Frequency.QUARTERLY) amount = amount / 3;
          if (op.frequency === Frequency.ANNUAL) amount = amount / 12;
          const cat = op.category || DEFAULT_CATEGORY;
          totals[cat] = (totals[cat] || 0) + amount;
        });
        return Object.entries(totals)
          .map(([catId, val]) => ({
            name: CATEGORIES[catId]?.label || catId,
            value: Math.round(val * rate),
            color: CATEGORIES[catId]?.color || '#64748b',
            catId
          }))
          .filter(d => d.value > 0)
          .sort((a, b) => b.value - a.value);
      }, [operations, rate]);

      const total = data.reduce((sum, d) => sum + d.value, 0);

      if (data.length === 0) {
        return (
          <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <h3 className="text-xs md:text-sm font-semibold uppercase tracking-wider text-slate-500 mb-2">Dépenses par catégorie (mensualisé)</h3>
            <div className="text-center text-slate-400 text-sm py-8 italic">Aucune dépense récurrente à analyser</div>
          </div>
        );
      }

      return (
        <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm h-full flex flex-col">
          <div className="flex justify-between items-center mb-2 shrink-0">
            <h3 className="text-xs md:text-sm font-semibold uppercase tracking-wider text-slate-500">Dépenses mensualisées par catégorie</h3>
            <span className="text-xs text-slate-400">Total: {formatCurrency(total, currency)}/mois</span>
          </div>
          <div className="flex flex-col gap-3 flex-1 min-h-0">
            <div className="w-full h-[160px] shrink-0">
              <ResponsiveContainer width="100%" height="100%">
                <PieChart>
                  <Pie data={data} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={35} outerRadius={65} paddingAngle={2}>

    /* ============================================================
       TABLEAU DE FORECAST
       ============================================================ */
    const ForecastTable = ({ data, onAdjustment, onSavingsAdjustment, isSimulation, currency }) => {

        setEditingMonth(m.monthKey);

      };

        if (editValue === '' || editValue === null) {
          onAdjustment(editingMonth, undefined);
        } else {
          onAdjustment(editingMonth, parseFloat(editValue));

        <div className={`bg-white rounded-xl border shadow-sm overflow-hidden ${isSimulation ? 'border-amber-300' : 'border-slate-200'}`}>

            <button onClick={() => setShowAll(!showAll)} className="text-[10px] flex items-center gap-1 px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-slate-600">
              {showAll ? 'Réduire' : 'Voir 10 ans'}

          <div className="overflow-x-auto">
            <table className="w-full text-sm">

                  <th className="px-4 md:px-6 py-2.5 text-left">Mois</th>
                  <th className="px-4 md:px-6 py-2.5 text-right">Revenus</th>
                  <th className="px-4 md:px-6 py-2.5 text-right">Dépenses</th>
                  <th className="px-4 md:px-6 py-2.5 text-right" title="Argent disponible sur ton compte bancaire">Compte courant</th>
                  <th className="px-4 md:px-6 py-2.5 text-right text-emerald-600" title="Capital épargné cumulé (versements + intérêts composés)">Capital épargné</th>

                      <td className="px-4 md:px-6 py-2.5">

                          <ChevronRight size={12} className="text-slate-400"/>

    const SavingsBalanceCell = ({ value, currency, onAdjust }) => {
      const [isEditing, setIsEditing] = useState(false);
      const [editValue, setEditValue] = useState(Math.round(value));

      useEffect(() => { setEditValue(Math.round(value)); }, [value]);

      const handleSave = () => {
        if (editValue === '' || editValue === null) {
          onAdjust(undefined);
        } else {
          onAdjust(parseFloat(editValue));
        }
        setIsEditing(false);
      };

      if (isEditing) {
        return (
          <input
            autoFocus
            type="number"
            value={editValue}
            onChange={(e) => setEditValue(e.target.value)}
            onBlur={handleSave}
            onKeyDown={(e) => { 
              if (e.key === 'Enter') handleSave(); 
              if (e.key === 'Escape') setIsEditing(false); 
            }}
            className="w-24 p-0.5 border border-indigo-400 rounded text-right text-xs font-bold"
          />
        );

              <div>
                <h3 className="font-bold text-slate-800 flex items-center gap-2">
                  <Calendar size={18} className="text-blue-600"/>

                </h3>
                <div className="text-xs text-slate-500 mt-1">
                  Solde fin : <span className={`font-bold ${m.finalEndBalance < 0 ? 'text-rose-600' : 'text-slate-700'}`}>{formatCurrency(m.finalEndBalance, currency)}</span>

            <div className="flex-1 overflow-y-auto p-4 space-y-4">

              <div>

    /* ============================================================
       MODAL PAIEMENT (Acompte / Solde final / Régularisation)
       ============================================================ */
    const PaymentModal = ({ target, onClose, onConfirm, currency }) => {
      const rate = currency === 'XPF' ? RATE_EUR_XPF : 1;
      const toView = (v) => v * rate;
      const fromView = (v) => v / rate;
      const { op, monthKey } = target;

      // Mode : 'FINAL' (paiement complet avec régularisation) ou 'ADVANCE' (acompte vers mois cible)
      const [mode, setMode] = useState('FINAL');
      const [amount, setAmount] = useState(Math.round(toView(op.amount)));
      const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
      
      // Mois cible pour acompte (mois suivant par défaut)
      const defaultTargetMonth = useMemo(() => {
        const [y, m] = monthKey.split('-').map(Number);
        const d = new Date(y, m, 1); // mois suivant
        return generateMonthKey(d);
      }, [monthKey]);
      const [targetMonth, setTargetMonth] = useState(defaultTargetMonth);

      const handleConfirm = () => {
        const amountEur = fromView(parseFloat(amount));
        if (!amountEur || amountEur <= 0) return;
        onConfirm({
          mode,
          amount: amountEur,
          date,
          targetMonth: mode === 'ADVANCE' ? targetMonth : null
        });
      };

      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[75] p-4 animate-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh] animate-zoom">

                Paiement – {op.label}

            </div>

            <div className="p-4 space-y-3 flex-1 overflow-y-auto">
              <div className="bg-slate-50 rounded-lg p-3 text-xs text-slate-600">
                <div>Prévu : <span className="font-bold">{formatCurrency(op.amount * rate, currency)}</span></div>
                <div>Pour le mois : <span className="font-bold">{monthKey}</span></div>

                    type="button"
                    onClick={() => setMode('FINAL')}
                    className={`p-2 rounded-lg text-xs font-medium border ${mode === 'FINAL' ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-slate-200 text-slate-600'}`}
                  >
                    <Check size={14} className="mx-auto mb-1"/>
                    Solde / Régul
                  </button>
                  <button
                    type="button"
                    onClick={() => setMode('ADVANCE')}
                    className={`p-2 rounded-lg text-xs font-medium border ${mode === 'ADVANCE' ? 'bg-amber-50 border-amber-400 text-amber-700' : 'bg-white border-slate-200 text-slate-600'}`}

    /* ============================================================
       MODAL PILOTAGE DU MOIS
       ============================================================ */
    const MonthTrackerModal = ({ operations, onClose, onAction, currency }) => {
      const rate = currency === 'XPF' ? RATE_EUR_XPF : 1;
      const now = new Date();
      const currentMonthKey = generateMonthKey(now);
      const monthLabel = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(now);

      const dueThisMonth = useMemo(() => {
        try {
          return operations.filter(op => {
            try {
              if (!op || typeof op !== 'object') return false;
              if (isTechnicalOperation(op)) return false;
              if (op.frequency === Frequency.ONCE) {
                return op.date && typeof op.date === 'string' && op.date.substring(0, 7) === currentMonthKey;
              }
              if (!op.startDate || typeof op.startDate !== 'string') return false;
              const opStart = parseDateLocal(op.startDate);
              if (isNaN(opStart.getTime())) return false;
              const opEnd = op.endDate ? parseDateLocal(op.endDate) : null;
              if (opEnd && isNaN(opEnd.getTime())) return false;
              const startYM = generateMonthKey(opStart);
              const endYM = opEnd ? generateMonthKey(opEnd) : null;
              if (currentMonthKey < startYM) return false;
              if (endYM && currentMonthKey > endYM) return false;
              const diffYear = now.getFullYear() - opStart.getFullYear();
              const diffMonth = now.getMonth() - opStart.getMonth();
              const totalMonthsDiff = diffYear * 12 + diffMonth;
              if (op.frequency === Frequency.MONTHLY) return true;
              if (op.frequency === Frequency.QUARTERLY) return totalMonthsDiff % 3 === 0;
              if (op.frequency === Frequency.ANNUAL) return totalMonthsDiff % 12 === 0;
              return false;
            } catch (e) {
              console.warn('Op invalide ignorée:', op, e);
              return false;
            }
          }).sort((a, b) => (b.amount || 0) - (a.amount || 0));
        } catch (e) {
          console.error('Erreur calcul dueThisMonth:', e);
          return [];
        }
      }, [operations, currentMonthKey]);

      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[70] p-4 animate-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh] animate-zoom">
            <div className="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center shrink-0">
              <h3 className="font-bold text-slate-800 flex items-center gap-2">
                <CalendarCheck size={18} className="text-indigo-600"/> 
                Pilotage – {monthLabel}
              </h3>
              <button onClick={onClose} className="p-1 text-slate-400 hover:text-slate-600 rounded-full hover:bg-slate-200"><X size={20}/></button>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-2">
              {dueThisMonth.length === 0 && <div className="text-center text-slate-400 italic py-8">Aucune opération à valider ce mois</div>}
              {dueThisMonth.map(op => (
                <div key={op.id} className="bg-slate-50 border border-slate-200 rounded-lg p-3">
                  <div className="flex justify-between items-start mb-2">
                    <div>
                      <div className="font-medium text-slate-800 text-sm">{op.label}</div>
                      <div className="flex items-center gap-2 mt-1">
                        <CategoryChip catId={op.category || DEFAULT_CATEGORY} size="xs"/>
                      </div>
                    </div>
                    <div className={`text-sm font-bold ${op.type === OperationType.INCOME ? 'text-emerald-600' : 'text-rose-600'}`}>

    /* ============================================================

      const setOverride = (opId, catId) => {
        setOverrides(prev => ({ ...prev, [opId]: catId }));
      };

      const handleConfirm = () => {
        const updated = operations.map(op => ({
          ...op,

      // Grouper par catégorie pour visualisation
      const grouped = useMemo(() => {
        const g = {};
        operations.forEach(op => {

          g[cat].push(op);
